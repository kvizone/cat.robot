<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Robot Runner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fff2df;
            --fg-color: #0a0a16;
            --accent-red: #fd0e45;
            --accent-pink: #fe5a8f;
            --dark-blue: #272938;
            --dark-red: #8c0013;
            --off-white: #f5fbff;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--dark-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            font-family: 'Press Start 2P', monospace;
            color: var(--fg-color);
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        #game-container {
            position: relative;
            aspect-ratio: 9 / 16;
            width: min(100vw, calc(100dvh * 9 / 16));
            height: min(100dvh, calc(100vw * 16 / 9));
            flex-shrink: 0;
            background-color: var(--bg-color);
            box-shadow: 0 0 40px rgba(10, 10, 22, 0.4);
            image-rendering: pixelated;
            border: 4px solid var(--fg-color);
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .screen {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            background-color: rgba(255, 242, 223, 0.9);
            padding: 20px;
            z-index: 10;
        }

        .screen.active {
            display: flex;
        }

        #start-screen {
            justify-content: flex-start;
            overflow-y: auto;
        }

        .start-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 8px;
        }

        #start-cat-canvas {
            width: 80px;
            height: 84px;
            image-rendering: pixelated;
            margin-bottom: 16px;
        }

        .start-hero h1 {
            margin-bottom: 16px;
        }

        .start-hero .subtitle {
            margin-bottom: 28px;
        }

        #hud-screen {
            background-color: transparent;
            justify-content: flex-start;
            pointer-events: none;
            z-index: 5;
        }

        .hud-top {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
        }

        .hud-stats {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 12px;
            line-height: 1.4;
        }

        .hidden {
            visibility: hidden;
        }

        #speed-debuff-indicator {
            color: var(--accent-red);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .pause-btn {
            pointer-events: auto;
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            background-color: var(--off-white);
            border: 4px solid var(--fg-color);
            box-shadow: 3px 3px 0 var(--fg-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        .pause-btn:hover {
            background-color: var(--fg-color);
        }

        .pause-btn:hover .pause-icon::before,
        .pause-btn:hover .pause-icon::after {
            background-color: var(--off-white);
        }

        .pause-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 var(--fg-color);
        }

        .pause-icon {
            display: flex;
            gap: 5px;
        }

        .pause-icon::before,
        .pause-icon::after {
            content: '';
            width: 6px;
            height: 18px;
            background-color: var(--fg-color);
        }

        #pause-overlay {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            background-color: rgba(255, 242, 223, 0.92);
            z-index: 20;
            pointer-events: auto;
        }

        #pause-overlay.active {
            display: flex;
        }

        #pause-overlay h2 {
            font-size: 28px;
            color: var(--fg-color);
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.5;
            color: var(--fg-color);
        }

        .subtitle {
            font-size: 10px;
            line-height: 1.8;
            text-align: center;
            max-width: 420px;
            margin-bottom: 32px;
            color: var(--dark-red);
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--dark-red);
        }

        .input-group {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        input[type="text"] {
            background-color: var(--off-white);
            border: 4px solid var(--fg-color);
            color: var(--fg-color);
            font-family: inherit;
            font-size: 20px;
            padding: 10px;
            text-align: center;
            width: 250px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent-red);
        }

        input[type="text"]::placeholder {
            color: rgba(10, 10, 22, 0.4);
        }

        .btn {
            background-color: var(--accent-red);
            color: var(--off-white);
            border: 4px solid var(--fg-color);
            padding: 15px 30px;
            font-family: inherit;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 4px 4px 0 var(--fg-color);
        }

        .btn:hover {
            background-color: var(--fg-color);
            color: var(--off-white);
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 var(--fg-color);
        }

        .leaderboard-container {
            margin-top: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            background-color: var(--off-white);
            border: 4px solid var(--fg-color);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 4px 4px 0 var(--dark-blue);
        }

        #leaderboard-list {
            list-style: none;
            text-align: left;
            max-height: 140px;
            overflow-y: auto;
        }

        #leaderboard-list li {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
            margin-bottom: 10px;
            font-size: 11px;
            border-bottom: 2px dashed var(--dark-blue);
            padding-bottom: 5px;
        }

        #leaderboard-list li.empty-row {
            display: block;
            text-align: center;
        }

        .rank-score {
            text-align: right;
            white-space: nowrap;
        }

        .final-score {
            font-size: 24px;
            margin-bottom: 16px;
            color: var(--accent-red);
            animation: bounce 1s infinite alternate;
        }

        .final-pigeons {
            font-size: 14px;
            margin-bottom: 40px;
            color: var(--dark-red);
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--off-white);
            border-left: 2px solid var(--fg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--fg-color);
        }

        @media (max-width: 768px) {
            body {
                padding: 0;
            }

            #game-container {
                width: 100vw;
                width: 100dvw;
                height: 100dvh;
                max-width: none;
                max-height: none;
                border: none;
                border-radius: 0;
                box-shadow: none;
            }

            .hud-top {
                padding: 12px;
            }

            .hud-stats {
                font-size: 10px;
            }

            .pause-btn {
                width: 40px;
                height: 40px;
            }

            h1 {
                font-size: 28px;
            }

            .screen {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="1067"></canvas>

        <div id="ui-layer">
            <div id="start-screen" class="screen active">
                <div class="start-hero">
                    <canvas id="start-cat-canvas" width="80" height="84" aria-hidden="true"></canvas>
                    <h1>ROBOT RUNNER</h1>
                    <p class="subtitle">Capture as pombas e desvie das IAs.</p>
                </div>

                <div class="input-group">
                    <label for="player-name">ENTER NAME:</label>
                    <input type="text" id="player-name" maxlength="10" placeholder="PLAYER">
                </div>
                <button id="start-btn" class="btn" type="button">START GAME</button>

                <div class="leaderboard-container">
                    <h2>RANKING</h2>
                    <ul id="leaderboard-list"></ul>
                </div>
            </div>

            <div id="hud-screen" class="screen">
                <div class="hud-top">
                    <div class="hud-stats">
                        <div id="score-display">SCORE: 0</div>
                        <div id="pigeons-display">POMBAS: 0</div>
                        <div id="speed-debuff-indicator" class="hidden">SLOWED</div>
                    </div>
                    <button id="pause-btn" class="pause-btn" type="button" aria-label="Pausar">
                        <span class="pause-icon" aria-hidden="true"></span>
                    </button>
                </div>
            </div>

            <div id="game-over-screen" class="screen">
                <h1>GAME OVER</h1>
                <div class="final-score">SCORE: <span id="final-score-val">0</span></div>
                <div class="final-pigeons">POMBAS: <span id="final-pigeons-val">0</span></div>
                <button id="restart-btn" class="btn" type="button">BACK TO START</button>
            </div>

            <div id="pause-overlay">
                <h2>PAUSED</h2>
                <button id="resume-btn" class="btn" type="button">RESUME</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startCatCanvas = document.getElementById('start-cat-canvas');
        const startCatCtx = startCatCanvas.getContext('2d');

        const playerNameInput = document.getElementById('player-name');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const resumeBtn = document.getElementById('resume-btn');
        const scoreDisplay = document.getElementById('score-display');
        const pigeonsDisplay = document.getElementById('pigeons-display');
        const speedDebuffIndicator = document.getElementById('speed-debuff-indicator');
        const finalScoreVal = document.getElementById('final-score-val');
        const finalPigeonsVal = document.getElementById('final-pigeons-val');
        const leaderboardList = document.getElementById('leaderboard-list');
        const pauseOverlay = document.getElementById('pause-overlay');
        const gameContainer = document.getElementById('game-container');

        const MUSIC_BPM = 132;
        const MUSIC_LOOKAHEAD = 0.12;
        const MUSIC_TICK_MS = 25;
        const MUSIC_STEP_TIME = 60 / (MUSIC_BPM * 4);
        const MUSIC_STEPS = 32;

        const MUSIC_NOTES = {
            E2: 82.41, F2: 87.31, G2: 98.00, A2: 110.00, B2: 123.47,
            C3: 130.81, D3: 146.83, E3: 164.81, F3: 174.61, G3: 196.00,
            A3: 220.00, B3: 246.94, C4: 261.63, D4: 293.66, E4: 329.63,
            F4: 349.23, G4: 392.00, A4: 440.00, B4: 493.88, C5: 523.25
        };

        const MUSIC_MELODY = [
            'E4', null, 'G4', 'A4', null, 'G4', 'E4', null,
            'C4', null, 'E4', 'G4', 'A4', 'B4', 'A4', 'G4',
            'E4', null, 'G4', 'A4', 'C5', 'A4', 'G4', 'E4',
            'D4', null, 'E4', 'G4', 'A4', null, 'G4', 'E4'
        ].map(note => (note ? MUSIC_NOTES[note] : null));

        const MUSIC_ARP = [
            ['A3', 'C4', 'E4', 'A4'], ['F3', 'A3', 'C4', 'F4'],
            ['C3', 'E3', 'G3', 'C4'], ['G3', 'B3', 'D4', 'G4'],
            ['A3', 'C4', 'E4', 'A4'], ['F3', 'A3', 'C4', 'F4'],
            ['E3', 'G3', 'B3', 'E4'], ['G3', 'B3', 'D4', 'G4']
        ].map(chord => chord.map(note => MUSIC_NOTES[note]));

        const MUSIC_BASS = [
            'A2', 'A2', 'A2', 'A2', 'F2', 'F2', 'F2', 'F2',
            'C3', 'C3', 'C3', 'C3', 'G2', 'G2', 'G2', 'G2',
            'A2', 'A2', 'A2', 'A2', 'F2', 'F2', 'F2', 'F2',
            'E2', 'E2', 'E2', 'E2', 'G2', 'G2', 'G2', 'G2'
        ].map(note => MUSIC_NOTES[note]);

        const musicEngine = {
            ctx: null,
            master: null,
            playing: false,
            step: 0,
            nextStepTime: 0,
            timerId: null
        };

        function initMusicEngine() {
            if (musicEngine.ctx) {
                if (musicEngine.ctx.state === 'suspended') {
                    musicEngine.ctx.resume();
                }
                return;
            }

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const master = audioCtx.createGain();
            master.gain.value = 0.63;
            master.connect(audioCtx.destination);

            musicEngine.ctx = audioCtx;
            musicEngine.master = master;
        }

        function playChipTone(freq, time, duration, type, volume) {
            if (!freq || !musicEngine.ctx) return;

            const osc = musicEngine.ctx.createOscillator();
            const gain = musicEngine.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, time);
            gain.gain.setValueAtTime(0.0001, time);
            gain.gain.exponentialRampToValueAtTime(volume, time + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);
            osc.connect(gain);
            gain.connect(musicEngine.master);
            osc.start(time);
            osc.stop(time + duration + 0.05);
        }

        function playChipKick(time) {
            if (!musicEngine.ctx) return;

            const sampleRate = musicEngine.ctx.sampleRate;
            const length = Math.floor(sampleRate * 0.12);
            const buffer = musicEngine.ctx.createBuffer(1, length, sampleRate);
            const data = buffer.getChannelData(0);

            for (let i = 0; i < length; i++) {
                const t = i / length;
                data[i] = (Math.random() * 2 - 1) * (1 - t) * (1 - t);
            }

            const source = musicEngine.ctx.createBufferSource();
            const filter = musicEngine.ctx.createBiquadFilter();
            const gain = musicEngine.ctx.createGain();
            source.buffer = buffer;
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(180, time);
            gain.gain.setValueAtTime(0.45, time);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.12);
            source.connect(filter);
            filter.connect(gain);
            gain.connect(musicEngine.master);
            source.start(time);
        }

        function playChipSnare(time) {
            if (!musicEngine.ctx) return;

            const sampleRate = musicEngine.ctx.sampleRate;
            const length = Math.floor(sampleRate * 0.08);
            const buffer = musicEngine.ctx.createBuffer(1, length, sampleRate);
            const data = buffer.getChannelData(0);

            for (let i = 0; i < length; i++) {
                const t = i / length;
                data[i] = (Math.random() * 2 - 1) * (1 - t);
            }

            const source = musicEngine.ctx.createBufferSource();
            const gain = musicEngine.ctx.createGain();
            source.buffer = buffer;
            gain.gain.setValueAtTime(0.16, time);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.08);
            source.connect(gain);
            gain.connect(musicEngine.master);
            source.start(time);
        }

        function playJumpPoing() {
            initMusicEngine();
            if (!musicEngine.ctx) return;

            const ctx = musicEngine.ctx;
            const time = ctx.currentTime;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.type = 'square';
            osc.frequency.setValueAtTime(220, time);
            osc.frequency.exponentialRampToValueAtTime(980, time + 0.07);
            osc.frequency.exponentialRampToValueAtTime(360, time + 0.2);

            gain.gain.setValueAtTime(0.0001, time);
            gain.gain.exponentialRampToValueAtTime(0.24, time + 0.008);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.22);

            osc.connect(gain);
            gain.connect(musicEngine.master);
            osc.start(time);
            osc.stop(time + 0.24);
        }

        function playButtonPlim() {
            initMusicEngine();
            if (!musicEngine.ctx) return;

            const ctx = musicEngine.ctx;
            const time = ctx.currentTime;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(1046.5, time);
            osc.frequency.exponentialRampToValueAtTime(1567.98, time + 0.04);

            gain.gain.setValueAtTime(0.0001, time);
            gain.gain.exponentialRampToValueAtTime(0.16, time + 0.004);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.14);

            osc.connect(gain);
            gain.connect(musicEngine.master);
            osc.start(time);
            osc.stop(time + 0.16);
        }

        function playTypeTap() {
            initMusicEngine();
            if (!musicEngine.ctx) return;

            const ctx = musicEngine.ctx;
            const time = ctx.currentTime;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(520, time);
            osc.frequency.exponentialRampToValueAtTime(280, time + 0.025);

            gain.gain.setValueAtTime(0.0001, time);
            gain.gain.exponentialRampToValueAtTime(0.09, time + 0.002);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.035);

            osc.connect(gain);
            gain.connect(musicEngine.master);
            osc.start(time);
            osc.stop(time + 0.04);
        }

        function playStartCatMeowPurr() {
            initMusicEngine();
            if (!musicEngine.ctx) return;

            const ctx = musicEngine.ctx;
            const time = ctx.currentTime;

            const meowOsc = ctx.createOscillator();
            const meowFilter = ctx.createBiquadFilter();
            const meowGain = ctx.createGain();

            meowOsc.type = 'sawtooth';
            meowOsc.frequency.setValueAtTime(720, time);
            meowOsc.frequency.exponentialRampToValueAtTime(320, time + 0.14);
            meowOsc.frequency.exponentialRampToValueAtTime(480, time + 0.32);
            meowOsc.frequency.exponentialRampToValueAtTime(260, time + 0.52);

            meowFilter.type = 'bandpass';
            meowFilter.frequency.setValueAtTime(580, time);
            meowFilter.Q.value = 1.8;

            meowGain.gain.setValueAtTime(0.0001, time);
            meowGain.gain.exponentialRampToValueAtTime(0.11, time + 0.025);
            meowGain.gain.setValueAtTime(0.09, time + 0.28);
            meowGain.gain.exponentialRampToValueAtTime(0.0001, time + 0.58);

            meowOsc.connect(meowFilter);
            meowFilter.connect(meowGain);
            meowGain.connect(musicEngine.master);
            meowOsc.start(time);
            meowOsc.stop(time + 0.62);

            const purrStart = time + 0.48;
            const purrOsc = ctx.createOscillator();
            const purrLfo = ctx.createOscillator();
            const purrLfoGain = ctx.createGain();
            const purrGain = ctx.createGain();

            purrOsc.type = 'triangle';
            purrOsc.frequency.setValueAtTime(28, purrStart);
            purrLfo.type = 'sine';
            purrLfo.frequency.setValueAtTime(5.5, purrStart);
            purrLfoGain.gain.value = 0.05;
            purrLfo.connect(purrLfoGain);
            purrLfoGain.connect(purrGain.gain);

            purrGain.gain.setValueAtTime(0.07, purrStart);
            purrGain.gain.exponentialRampToValueAtTime(0.0001, purrStart + 1.1);

            purrOsc.connect(purrGain);
            purrGain.connect(musicEngine.master);
            purrOsc.start(purrStart);
            purrOsc.stop(purrStart + 1.15);
            purrLfo.start(purrStart);
            purrLfo.stop(purrStart + 1.15);
        }

        function playCrashTrash() {
            initMusicEngine();
            if (!musicEngine.ctx) return;

            const ctx = musicEngine.ctx;
            const time = ctx.currentTime;
            const sampleRate = ctx.sampleRate;
            const length = Math.floor(sampleRate * 0.38);
            const buffer = ctx.createBuffer(1, length, sampleRate);
            const data = buffer.getChannelData(0);

            for (let i = 0; i < length; i++) {
                const t = i / length;
                data[i] = (Math.random() * 2 - 1) * (1 - t) * (1 - t);
            }

            const noise = ctx.createBufferSource();
            const noiseFilter = ctx.createBiquadFilter();
            const noiseGain = ctx.createGain();
            noise.buffer = buffer;
            noiseFilter.type = 'bandpass';
            noiseFilter.frequency.setValueAtTime(920, time);
            noiseFilter.frequency.exponentialRampToValueAtTime(90, time + 0.32);
            noiseFilter.Q.value = 0.9;
            noiseGain.gain.setValueAtTime(0.38, time);
            noiseGain.gain.exponentialRampToValueAtTime(0.0001, time + 0.36);
            noise.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(musicEngine.master);
            noise.start(time);

            const thud = ctx.createOscillator();
            const thudGain = ctx.createGain();
            thud.type = 'sawtooth';
            thud.frequency.setValueAtTime(160, time);
            thud.frequency.exponentialRampToValueAtTime(35, time + 0.28);
            thudGain.gain.setValueAtTime(0.0001, time);
            thudGain.gain.exponentialRampToValueAtTime(0.3, time + 0.012);
            thudGain.gain.exponentialRampToValueAtTime(0.0001, time + 0.32);
            thud.connect(thudGain);
            thudGain.connect(musicEngine.master);
            thud.start(time);
            thud.stop(time + 0.34);

            const crunch = ctx.createOscillator();
            const crunchGain = ctx.createGain();
            crunch.type = 'square';
            crunch.frequency.setValueAtTime(110, time);
            crunch.frequency.exponentialRampToValueAtTime(42, time + 0.16);
            crunchGain.gain.setValueAtTime(0.2, time);
            crunchGain.gain.exponentialRampToValueAtTime(0.0001, time + 0.18);
            crunch.connect(crunchGain);
            crunchGain.connect(musicEngine.master);
            crunch.start(time);
            crunch.stop(time + 0.2);
        }

        function scheduleMusicStep(step, time) {
            const melody = MUSIC_MELODY[step];
            const bass = MUSIC_BASS[step];
            const arp = MUSIC_ARP[Math.floor(step / 4)][step % 4];

            if (melody) {
                playChipTone(melody, time, MUSIC_STEP_TIME * 0.9, 'square', 0.09);
            }

            if (step % 2 === 0) {
                playChipTone(arp, time, MUSIC_STEP_TIME * 0.75, 'square', 0.045);
            }

            if (step % 4 === 0) {
                playChipTone(bass, time, MUSIC_STEP_TIME * 3.6, 'triangle', 0.14);
            }

            if (step % 8 === 0) {
                playChipKick(time);
            } else if (step % 8 === 4) {
                playChipSnare(time);
            }
        }

        function musicSchedulerTick() {
            if (!musicEngine.playing || !musicEngine.ctx) return;

            while (musicEngine.nextStepTime < musicEngine.ctx.currentTime + MUSIC_LOOKAHEAD) {
                scheduleMusicStep(musicEngine.step, musicEngine.nextStepTime);
                musicEngine.nextStepTime += MUSIC_STEP_TIME;
                musicEngine.step = (musicEngine.step + 1) % MUSIC_STEPS;
            }
        }

                for (let c = 0; c < sprite[r].length; c++) {
                    const colorIndex = sprite[r][c];
                    if (colorIndex !== 0) {
                        context.fillStyle = palette[colorIndex];
                        context.fillRect(x + c * scale, y + r * scale, scale, scale);
                    }
                }
            }

                const density = 1 - y / 90;
                for (let x = 0; x < CANVAS_WIDTH; x += 4) {
                    if ((x + y * 3) % 9 < density * 5) {
                        context.fillRect(x, y, 2, 2);
                    }
                }
            }

            const blocks = [

            ];
            for (const [bx, by, bw] of blocks) {
                context.fillRect(cx + bx * unit, cy + by * unit, bw * unit, unit);
            }
        }

            for (let row = 0; row < height; row++) {

                context.fillRect(x + inset, groundY - height + row, width - inset * 2, 1);

            ctx.fillStyle = GROUND_ACCENT;

            for (let x = -groundOffset - GROUND_PATTERN; x < CANVAS_WIDTH + 10; x += 10) {
                const idx = Math.floor((x + groundOffset) / 10);
                if (idx % 3 !== 1) {
                    ctx.fillRect(x, GROUND_Y - 8, 4, 2);
                }
            }

            for (let x = -groundOffset - GROUND_PATTERN; x < CANVAS_WIDTH + 10; x += 14) {
                const idx = Math.floor((x + groundOffset + 6) / 14);
                if (idx % 2 === 0) {
                    ctx.fillRect(x, GROUND_Y + 10, 2, 2);
                }

            for (let x = -groundOffset - GROUND_PATTERN; x < CANVAS_WIDTH + 10; x += 24) {
                const idx = Math.floor((x + groundOffset) / 24);
                if (idx % 2 === 0) {
                    ctx.fillRect(x, GROUND_Y + 18, 3, 2);
                }

        function spawnObstacle() {
            const rand = Math.random();
            const type = rand < 0.4 ? 'drone' : (rand < 0.7 ? 'monitor' : 'robot');
            const sprite = type === 'drone' ? sprDrone : (type === 'monitor' ? sprMonitor : sprRobotObs);
            const width = sprite[0].length * CAT_SCALE;
            const height = sprite.length * CAT_SCALE;

            if (obstacles.length > 0) {
                const last = obstacles[obstacles.length - 1];
                if (CANVAS_WIDTH - last.x < 220) return;
            }

            const yPos = type === 'drone' ? GROUND_Y - 75 : GROUND_Y - height;

            obstacles.push({
                x: CANVAS_WIDTH,
                y: yPos,
                width,
                height,

        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y
            );
        }

        function updatePlaying() {
            frames++;
            distance += currentSpeed;
            score = Math.floor(distance / 20);
            updateHud();

            if (score <= 800) {
                const speedTiers = Math.floor(score / 50);
                baseSpeed = 6 * Math.pow(1.05, speedTiers);
            } else if (score <= 1000) {
                baseSpeed = 6 * Math.pow(1.05, 16);
            } else {
                const speedAt800 = 6 * Math.pow(1.05, 16);
                const extraTiers = Math.floor((score - 1000) / 50);
                baseSpeed = speedAt800 * Math.pow(1.01, extraTiers);
            }

            if (slowDownTimer > 0) {
                slowDownTimer--;
                speedMultiplier = 0.6;
                speedDebuffIndicator.classList.remove('hidden');
            } else {
                speedMultiplier = 1;
                speedDebuffIndicator.classList.add('hidden');
            }

            currentSpeed = baseSpeed * speedMultiplier;

            robot.vy += robot.gravity;
            robot.y += robot.vy;

            if (robot.y >= GROUND_Y - robot.height) {
                robot.y = GROUND_Y - robot.height;
                robot.vy = 0;
                robot.isGrounded = true;
            } else {
                robot.isGrounded = false;
            }

            if (robot.isGrounded) {
                robot.animationTimer++;
                const animThreshold = Math.max(2, Math.floor(60 / currentSpeed));
                if (robot.animationTimer > animThreshold) {
                    robot.runFrame = (robot.runFrame + 1) % 2;
                    robot.animationTimer = 0;
                }

                if (robot.isDucking) {
                    robot.height = robot.duckHeight;
                    robot.y = GROUND_Y - robot.duckHeight;
                } else {
                    robot.height = robot.normalHeight;
                    robot.y = GROUND_Y - robot.normalHeight;
                }
            } else {
                robot.runFrame = 0;
                robot.height = robot.normalHeight;
            }

            updateGroundScroll(currentSpeed);

            if (frames % Math.floor(70 / speedMultiplier) === 0 && Math.random() < 0.8) {
                spawnObstacle();
            }

            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].x -= currentSpeed;

                const hitBox1 = {
                    x: robot.x + 10,
                    y: robot.y + 10,
                    width: robot.width - 20,
                    height: robot.height - 10
                };
                const hitBox2 = {
                    x: obstacles[i].x + 10,
                    y: obstacles[i].y + 10,
                    width: obstacles[i].width - 20,
                    height: obstacles[i].height - 10
                };

                if (checkCollision(hitBox1, hitBox2)) {
                    gameOver();
                    return;
                }
            }

            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);

            if (score >= nextPigeonScoreTarget) {
                spawnPigeon();
                nextPigeonScoreTarget += 150;
            }

            for (let i = 0; i < pigeons.length; i++) {
                pigeons[i].x -= currentSpeed;
                pigeons[i].y += Math.sin(frames * 0.1) * 1.5;

                if (checkCollision(robot, pigeons[i])) {
                    pigeonsCaptured++;
                    slowDownTimer = 300;
                    pigeons.splice(i, 1);
                    i--;
                    updateHud();
                }
            }

            pigeons = pigeons.filter(pigeon => pigeon.x + pigeon.width > 0);
        }

        function drawPlaying() {
            drawStaticBackground();
            drawGround();

            let activeSprite = robot.runFrame === 0 ? sprCatRun1 : sprCatRun2;
            if (robot.isDucking && robot.isGrounded) {
                activeSprite = sprCatDuck1;
            } else if (!robot.isGrounded) {
                activeSprite = sprCatRun1;
            }

            const drawY = robot.isGrounded ? GROUND_Y - 12 * CAT_SCALE : robot.y;
            drawSprite(activeSprite, robot.x, drawY, CAT_SCALE);

            for (const obs of obstacles) {
                drawSprite(obs.sprite, obs.x, obs.y, CAT_SCALE);
            }

            for (const pigeon of pigeons) {
                drawSprite(pigeon.sprite, pigeon.x, pigeon.y, CAT_SCALE);
            }
        }

        function gameLoop() {
            if (gameState === 'PLAYING') {
                updatePlaying();
                drawPlaying();
            } else if (gameState === 'PAUSED') {
                drawPlaying();
            }
            requestAnimationFrame(gameLoop);
        }

        function jump() {
            if (gameState === 'PLAYING' && robot.isGrounded) {
                robot.vy = robot.jumpPower;
                robot.isGrounded = false;
                robot.isDucking = false;
                playJumpPoing();
            }
        }

        function duck(isDucking) {
            if (gameState === 'PLAYING') {
                robot.isDucking = isDucking;
                if (isDucking && !robot.isGrounded) {
                    robot.vy += 2;
                }
            }
        }

        function setScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function pauseGame() {
            if (gameState !== 'PLAYING') return;
            gameState = 'PAUSED';
            pauseOverlay.classList.add('active');
        }

        function resumeGame() {
            if (gameState !== 'PAUSED') return;
            gameState = 'PLAYING';
            pauseOverlay.classList.remove('active');
        }

        function startGame() {
            const name = playerNameInput.value.trim().toUpperCase() || 'PLAYER';
            playerName = name;
            setScreen('hud-screen');
            resetGame();
            gameState = 'PLAYING';
        }

        function gameOver() {
            playCrashTrash();
            gameState = 'GAMEOVER';
            finalScoreVal.textContent = score;
            finalPigeonsVal.textContent = pigeonsCaptured;
            pauseOverlay.classList.remove('active');
            setScreen('game-over-screen');
            saveScore(playerName, score);
        }

        function saveScore(name, playerScore) {
            const leaderboard = JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || '[]');
            leaderboard.push({ name, score: playerScore });
            leaderboard.sort((a, b) => b.score - a.score);
            localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(leaderboard.slice(0, 10)));
        }

        function loadLeaderboard() {
            const leaderboard = JSON.parse(localStorage.getItem(LEADERBOARD_KEY) || '[]');
            leaderboardList.innerHTML = '';

            if (leaderboard.length === 0) {
                const li = document.createElement('li');
                li.className = 'empty-row';
                li.textContent = 'NO SCORES YET';
                leaderboardList.appendChild(li);
                return;
            }

            leaderboard.forEach((entry, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${index + 1}. ${entry.name}</span>
                    <span class="rank-score">${entry.score}</span>
                `;
                leaderboardList.appendChild(li);
            });
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Escape') {
                if (gameState === 'PLAYING') pauseGame();
                else if (gameState === 'PAUSED') resumeGame();
                return;
            }

            if ((e.code === 'Space' || e.code === 'ArrowUp') && gameState === 'PLAYING') {
                e.preventDefault();
                jump();
            } else if ((e.code === 'ArrowDown' || e.code === 'KeyS') && gameState === 'PLAYING') {
                duck(true);
            } else if (e.code === 'Enter') {
                if (gameState === 'START') startGame();
                else if (gameState === 'GAMEOVER') restartBtn.click();
                else if (gameState === 'PAUSED') resumeGame();
            }
        });

        window.addEventListener('keyup', (e) => {
            if ((e.code === 'ArrowDown' || e.code === 'KeyS') && gameState === 'PLAYING') {
                duck(false);
            }
        });

        const TOUCH_SWIPE_THRESHOLD = 50;
        const TOUCH_TAP_MAX_MS = 250;
        let touchStartY = null;
        let touchStartTime = 0;
        let touchIsDucking = false;
        let touchDidSlide = false;
        let touchDidJump = false;

        function resetTouchState() {
            touchStartY = null;
            touchStartTime = 0;
            touchIsDucking = false;
            touchDidSlide = false;
            touchDidJump = false;
        }

        canvas.addEventListener('touchstart', (e) => {
            if (gameState !== 'PLAYING') return;

            touchStartY = e.touches[0].clientY;
            touchStartTime = Date.now();
            touchIsDucking = false;
            touchDidSlide = false;
            touchDidJump = false;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (gameState !== 'PLAYING' || touchStartY === null) return;

            const deltaY = e.touches[0].clientY - touchStartY;

            if (deltaY >= TOUCH_SWIPE_THRESHOLD) {
                touchDidSlide = true;
                if (!touchIsDucking) {
                    touchIsDucking = true;
                    duck(true);
                }
            } else if (deltaY <= -TOUCH_SWIPE_THRESHOLD) {
                touchDidSlide = true;
                if (touchIsDucking) {
                    touchIsDucking = false;
                    duck(false);
                }
                if (!touchDidJump) {
                    touchDidJump = true;
                    jump();
                }
            } else if (touchIsDucking) {
                touchIsDucking = false;
                duck(false);
            }

            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (gameState !== 'PLAYING') {
                resetTouchState();
                return;
            }

            const touchDuration = Date.now() - touchStartTime;
            const endY = e.changedTouches[0].clientY;
            const deltaY = touchStartY === null ? 0 : endY - touchStartY;

            if (touchIsDucking) {
                duck(false);
            } else if (!touchDidJump) {
                const isTap = touchDuration <= TOUCH_TAP_MAX_MS && Math.abs(deltaY) < TOUCH_SWIPE_THRESHOLD;
                const isSwipeUp = deltaY <= -TOUCH_SWIPE_THRESHOLD;
                if (isTap || isSwipeUp) {
                    jump();
                }
            }

            resetTouchState();
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchcancel', () => {
            if (touchIsDucking && gameState === 'PLAYING') {
                duck(false);
            }
            resetTouchState();
        });

        function bindButtonPlim(button, handler) {
            button.addEventListener('click', () => {
                playButtonPlim();
                handler();
            });
        }

        bindButtonPlim(startBtn, startGame);
        bindButtonPlim(restartBtn, () => {
            loadLeaderboard();
            setScreen('start-screen');
            gameState = 'START';
            playStartCatMeowPurr();
        });
        bindButtonPlim(pauseBtn, pauseGame);
        bindButtonPlim(resumeBtn, resumeGame);

        playerNameInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey || e.altKey) return;
            initMusicEngine();
            if (musicEngine.ctx?.state === 'suspended') {
                musicEngine.ctx.resume();
            }
            if (e.key.length === 1 || e.key === 'Backspace' || e.key === 'Delete') {
                playTypeTap();
            }
        });

        drawStartCat();
        loadLeaderboard();
        initMusicEngine();
        tryPlayStartScreenSound();
        requestAnimationFrame(gameLoop);
    </script>

  // 3. FUNÇÃO PARA SALVAR A PONTUAÇÃO
  // Chame essa função quando o robozinho colidir e o jogo acabar!
  function salvarPontuacao(nomeJogador, pontos) {
    database.ref('ranking/').push({
      nome: nomeJogador,
      pontuacao: Number(pontos), // Garante que é um número para ordenar certo
      data: new Date().toISOString()
    }).then(() => {
      console.log("Pontuação salva com sucesso!");
      atualizarTabelaRanking(); // Atualiza a tabela automaticamente na tela
    }).catch((error) => {
      console.error("Erro ao salvar:", error);
    });
  }

  // 4. FUNÇÃO PARA BUSCAR O RANKING E COLOCAR NA TABELA
  // Chame essa função assim que a página carregar ou quando abrir a tela de Game Over
  function atualizarTabelaRanking() {
    // Busca os maiores pontos ordenados, limitando aos 10 melhores
    database.ref('ranking/').orderByChild('pontuacao').limitToLast(10).once('value', (snapshot) => {
      let listaRanking = [];
      
      snapshot.forEach((childSnapshot) => {
        listaRanking.push(childSnapshot.val());
      });

      // O Firebase traz do menor para o maior, então invertemos para o maior ficar em 1º
      listaRanking.reverse();

      // ATENÇÃO: Troque 'ID_DA_SUA_TABELA' pelo ID real da sua tabela HTML (ou do <tbody> dela)
      const tabela = document.getElementById('rankingBody'); 
      
      if(tabela) {
        tabela.innerHTML = ""; // Limpa o ranking antigo para não duplicar

        listaRanking.forEach((jogador, index) => {
          tabela.innerHTML += `
            <tr>
              <td>${index + 1}º</td>
              <td>${jogador.nome}</td>
              <td>${jogador.pontuacao} pts</td>
            </tr>
          `;
        });
      }
    });
  }

  // Executa a busca do ranking assim que o jogo abre para já mostrar o placar atualizado
  window.onload = atualizarTabelaRanking;
</script>
